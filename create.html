<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event creator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg">
        <div id="one"></div>
        <div id="two"></div>
        <div id="three"></div>
        <div id="four"></div>
    </div>
    <div class="cardContainer">
        <div class="card">
            <div class="title">Start your plan now. ✨</div>
            <div class="box">
                <div class="content">
                    <div class="partyLeader">
                        <div class="userProflie"></div>
                        <div class="line"></div>
                        <div class="leader">
                            <div id="userName">username</div> <!--usernamefromDB-->
                            <div id="role">Party leader</div>
                        </div>
                    </div>
                    <form id="form" action="#" method="GET">
                        <div class="contentDetails">
                            <div class="inputDetails">
                                <div class="container">
                                    <label class="fillIndetails">Plan's name<br/>
                                    <input id="inputPlanName" type="text" placeholder="your plan's name">
                                    </label>
                                </div>
                                <div class="container">
                                    <label class="fillIndetails">Detail</label><br/>
                                    <textarea id="inputDetail" placeholder="tell more details about your plan !"></textarea>
                                </div>      
                                <div class="inputTime container">
                                    <label class="fillIndetails">Time period<br/>
                                    <div class="timePeriodContainer">
                                        <div class="firstTimePeriod">
                                            <input id="inputfistTimePeriod" type="date">
                                        </div>
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                        </svg>
                                        <div class="lastTimePeriod">
                                            <input id="inputLastTimePeriod" type="date"><br>
                                        </div>
                                    </div>
                                    </label>
                                </div>     
                                <div class="container">
                                    <label class="fillIndetails">Location</label><br />
                                    <input id="inputLocation" type="text" placeholder="where to go ?">
                                </div>
                                <div class="container">
                                    <label class="fillIndetails">participants</label><br/>
                                    <input id="inputParticipants" class="inputD" type="text" placeholder="ex. John Ted Belle" value><br> <!--เลือกusernameคนอื่น-->
                                </div>
                            </div>
                        </form>
                    </div>  
                </div>
            </div>
            <div class="btn">
                <button id="next">Done</button>
                <div id="cancle">cancle</div>
            </div>
        </div>
    </div>
</body>
</html>
